name: Release

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate tag matches manifest version
        run: |
          node <<'NODE'
          const fs = require('fs');
          const tag = process.env.GITHUB_REF_NAME || '';
          const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
          const normalizedTag = tag.replace(/^v/, '');
          if (normalizedTag !== manifest.version) {
            console.error(`Tag ${tag} does not match manifest version ${manifest.version}`);
            process.exit(1);
          }
          NODE

      - name: Build
        run: npm run build

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Extract release notes from CHANGELOG
        run: |
          node <<'NODE'
          const fs = require('fs');
          const version = JSON.parse(fs.readFileSync('manifest.json', 'utf8')).version;
          const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
          const lines = changelog.split('\n');
          const start = lines.findIndex((line) => line.startsWith(`## [${version}]`));
          let body = `Release ${version}. See CHANGELOG.md for details.`;
          if (start !== -1) {
            let end = lines.length;
            for (let i = start + 1; i < lines.length; i++) {
              if (lines[i].startsWith('## [')) { end = i; break; }
            }
            body = lines.slice(start + 1, end).join('\n').trim();
          }
          fs.writeFileSync('RELEASE_NOTES.md', body + '\n');
          NODE

      - name: Package plugin tree (spec 1.1 f3, §4.2 — tree contents at archive root)
        run: npm run plugin:zip -- plugin "knowlery-plugin-$(node -p "require('./manifest.json').version").zip"

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          body_path: RELEASE_NOTES.md
          files: |
            main.js
            manifest.json
            styles.css
            knowlery-plugin-*.zip

      # OIDC trusted publishing (spec 0.8 f3, §4.1): no token — npmjs.com trusts this
      # workflow's identity via the id-token permission above. Requires npm >= 11.5.1
      # and Node >= 22.14 in this step only (the CLI artifact still targets node 18).
      # Deliberately no registry-url on setup-node: it writes an _authToken line into
      # .npmrc that can interfere with the OIDC exchange.
      - name: Set up Node.js for npm publish
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Publish CLI to npm (OIDC trusted publishing)
        run: |
          npm install -g npm@latest
          VERSION=$(node -p "JSON.parse(require('fs').readFileSync('manifest.json','utf8')).version")
          # Idempotent re-run guard (spec 0.8 f3, §4.2): a workflow re-run on an
          # already-published tag is a green no-op, not a version-conflict failure.
          if npm view "knowlery@${VERSION}" version >/dev/null 2>&1; then
            echo "knowlery@${VERSION} already on the registry — skipping publish (idempotent re-run)."
            exit 0
          fi
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            npm publish --tag beta
          else
            npm publish
          fi
