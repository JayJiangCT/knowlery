name: Release

on:
  push:
    tags:
      - '*.*.*'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate tag matches manifest version
        run: |
          node <<'NODE'
          const fs = require('fs');
          const tag = process.env.GITHUB_REF_NAME || '';
          const manifest = JSON.parse(fs.readFileSync('manifest.json', 'utf8'));
          const normalizedTag = tag.replace(/^v/, '');
          if (normalizedTag !== manifest.version) {
            console.error(`Tag ${tag} does not match manifest version ${manifest.version}`);
            process.exit(1);
          }
          NODE

      - name: Build
        run: npm run build

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            main.js
            manifest.json
            styles.css

      - name: Extract release notes from CHANGELOG
        run: |
          node <<'NODE'
          const fs = require('fs');
          const version = JSON.parse(fs.readFileSync('manifest.json', 'utf8')).version;
          const changelog = fs.readFileSync('CHANGELOG.md', 'utf8');
          const lines = changelog.split('\n');
          const start = lines.findIndex((line) => line.startsWith(`## [${version}]`));
          let body = `Release ${version}. See CHANGELOG.md for details.`;
          if (start !== -1) {
            let end = lines.length;
            for (let i = start + 1; i < lines.length; i++) {
              if (lines[i].startsWith('## [')) { end = i; break; }
            }
            body = lines.slice(start + 1, end).join('\n').trim();
          }
          fs.writeFileSync('RELEASE_NOTES.md', body + '\n');
          NODE

      - name: Publish release assets
        uses: softprops/action-gh-release@v2
        with:
          prerelease: ${{ contains(github.ref_name, '-') }}
          body_path: RELEASE_NOTES.md
          files: |
            main.js
            manifest.json
            styles.css

      - name: Publish CLI to npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          if [ -z "$NODE_AUTH_TOKEN" ]; then
            echo "::warning::NPM_TOKEN secret is not set — skipping npm publish of the knowlery CLI."
            exit 0
          fi
          npm config set //registry.npmjs.org/:_authToken "$NODE_AUTH_TOKEN"
          if [[ "$GITHUB_REF_NAME" == *-* ]]; then
            npm publish --tag beta
          else
            npm publish
          fi
