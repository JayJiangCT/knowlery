name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm test

  installer-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Syntax check
        run: sh -n docs-site/public/install.sh
      - name: Install into a bin dir NOT on PATH — consent path, idempotence (spec 1.3 f1, §3.1)
        run: |
          export HOME=$(mktemp -d)
          export SHELL=/bin/bash
          touch "$HOME/.bashrc"
          KNOWLERY_INSTALL_YES=1 sh docs-site/public/install.sh
          test -L "$HOME/.local/bin/knowlery"
          "$HOME/.local/bin/knowlery" --version
          KNOWLERY_INSTALL_YES=1 sh docs-site/public/install.sh
          COUNT=$(grep -c "added by the knowlery installer" "$HOME/.bashrc")
          test "$COUNT" = "1"
      - name: Install with the bin dir already on PATH — rc untouched (spec 1.3 f1, §3.2)
        run: |
          export HOME=$(mktemp -d)
          export SHELL=/bin/bash
          mkdir -p "$HOME/.local/bin"
          touch "$HOME/.bashrc"
          PATH="$HOME/.local/bin:$PATH" KNOWLERY_INSTALL_YES=1 sh docs-site/public/install.sh
          test ! -s "$HOME/.bashrc"
