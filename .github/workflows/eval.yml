name: Retrieval eval

on:
  pull_request:

jobs:
  assert-baseline:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run eval -- --assert-baseline

  generated-script-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
      - name: Fail if the committed query-script bundle is stale
        run: git diff --exit-code src/assets/query-script.generated.ts

  cook-eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run eval:cook -- --assert-baseline
      - name: Cook-skill drift guard (spec 1.3 f2, §4.3 — no silent golden staleness)
        if: github.event_name == 'pull_request'
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          BASE_SHA=$(git merge-base origin/${{ github.base_ref }} HEAD)
          CHANGED=$(git diff --name-only "$BASE_SHA" HEAD)
          if echo "$CHANGED" | grep -q '^plugin/skills/cook/SKILL.md$' \
             && ! echo "$CHANGED" | grep -q '^evals/cook/' ; then
            if echo "$PR_BODY" | grep -q 'cook-eval-waiver'; then
              echo "cook skill changed without eval regen — waived via cook-eval-waiver in the PR body."
            else
              echo "::error::The cook skill changed but evals/cook/ was not touched."
              echo "Re-cook the fixtures per evals/cook/README.md, or add 'cook-eval-waiver' to the PR body for prose-only edits."
              exit 1
            fi
          fi

  # Spec 1.3 f4: observational until the graduation criteria in the spec are
  # met (>=10 runs, zero false failures, per-path paired ratio max <= 1.3);
  # the maintainer then flips it required and records the flip in the spec.
  perf:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # the paired layer needs the merge-base commit
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Benchmark head (ceilings + growth shape + federation ratio)
        run: npm run eval:perf -- --tiers medium,large --assert-budgets --json /tmp/perf-head.json
      - name: Paired base/head comparison (spec 1.3 f4, §4.3 — same runner, same methodology)
        if: github.event_name == 'pull_request'
        run: |
          BASE_SHA=$(git merge-base origin/${{ github.base_ref }} HEAD)
          git worktree add /tmp/perf-base "$BASE_SHA"
          # --allow-missing-base is the F4-landing bootstrap exception ONLY:
          # remove it from this line immediately after F4 merges (spec §4.3,
          # landing checklist — it must not become permanent configuration).
          npm run eval:perf -- --tiers medium --src /tmp/perf-base --allow-missing-base --json /tmp/perf-base.json
          npx tsx evals/perf/compare.ts /tmp/perf-head.json /tmp/perf-base.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: perf-report
          path: /tmp/perf-*.json
          if-no-files-found: ignore

  plugin-drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build:plugin
      - name: Fail if the committed plugin tree or catalog is stale (spec 1.1 f2 §4.2, f3 §5.1)
        run: git diff --exit-code plugin/ .claude-plugin/ && test -z "$(git status --porcelain plugin/ .claude-plugin/)"
